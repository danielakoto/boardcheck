<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ===== CRITICAL SEO TAGS ===== -->
    <title>BoardCheck - Speed Test & Keyboard Tester</title>

    <!-- Meta Description -->
    <meta name="description" content="Typing Speed Test & Keyboard Tester. Test your keyboard in seconds with BoardCheck. Detect dead keys.">

    <!-- ===== CANONICAL & LANGUAGE ===== -->
    <meta property="og:url" content="https://boardcheck.app">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">

    <!-- ===== OPEN GRAPH TAGS (Social Media Sharing) ===== -->
    <meta property="og:title" content="BoardCheck - Test Your Keyboard Now">
    
    <!-- og:description - Social preview description (under 200 chars) -->
    <meta property="og:description" content="Instantly test every key on your keyboard. Detect problems, check typing speed with beautiful analytics.">
    
    <!-- og:image - Social preview image (1200x630px recommended, 1.91:1 ratio) -->
    <meta property="og:image" content="https://boardcheck.app/images/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    
    <!-- og:site_name -->
    <meta property="og:site_name" content="BoardCheck">

    <!-- ===== TWITTER/X CARD TAGS ===== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="BoardCheck - Test Your Keyboard Now">
    <meta name="twitter:description" content="Instantly test every key on your keyboard. Detect problems, check typing speed with beautiful analytics.">
    <meta name="twitter:image" content="https://boardcheck.app/images/og-image.png">
    <meta name="twitter:image:alt" content="BoardCheck keyboard tester interface showing typing speed and key diagnostics">

    <!-- ===== ADDITIONAL SEO TAGS ===== -->
    <meta name="keywords" content="keyboard tester, typing speed test, key tester, keyboard test, mechanical keyboard tester, type test, typing test online">
    
    <!-- Author -->
    <meta name="author" content="Sulce Studio">

    <!-- ===== SCHEMA.ORG STRUCTURED DATA ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "BoardCheck",
      "description": "Typing Speed Test & Keyboard Tester. Test your keyboard in seconds with BoardCheck. Detect dead keys.",
      "url": "https://boardcheck.app",
      "applicationCategory": "UtilityApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "image": "https://boardcheck.app/images/og-image.png"
    }
    </script>

    <!-- ===== FAVICON & APP ICONS ===== -->
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- ===== FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">

    <!-- ===== GOOGLE SIGN-IN ===== -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../src/main.jsx"></script>
  </body>
</html>
